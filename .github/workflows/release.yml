# Codesteward — Release
#
# Triggered by version tags (e.g. v0.1.0). Pipeline:
#   1. test            — run the full test suite (gate)
#   2. build-packages  — uv build both PyPI packages (artifacts)
#   3. publish-pypi    — publish codesteward-graph, wait, publish codesteward-mcp
#   4. container       — build image, Trivy scan (gate), push, cosign sign, SBOM
#   5. release         — create GitHub release with dist + SBOM + scan report
#
# PyPI publishing uses OIDC Trusted Publishing — no API token secret needed.
# The Docker image is published to ghcr.io via GITHUB_TOKEN and signed with
# cosign keyless (GitHub OIDC).
#
# SHA PINNING:
#   Version tags used below; Renovate pins them to SHA on first run.

name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Gate: tests must pass before we publish anything ─────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: false   # avoid cache-poisoning on release-tagged runs

      - name: Install dependencies
        run: uv sync --all-packages --extra graph-all --frozen

      - name: Run tests
        run: uv run pytest tests/ -v

  # ── Build PyPI packages ───────────────────────────────────────────────────────
  build-packages:
    name: Build packages
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: false   # avoid cache-poisoning on release-tagged runs

      - name: Build codesteward-graph
        run: uv build packages/codesteward-graph --out-dir packages/codesteward-graph/dist

      - name: Build codesteward-mcp
        run: uv build packages/codesteward-mcp --out-dir packages/codesteward-mcp/dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist/
          if-no-files-found: error

  # ── Publish to PyPI (OIDC Trusted Publisher) ─────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-packages
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish codesteward-graph
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/codesteward-graph/dist/

      - name: Wait for PyPI to index codesteward-graph
        run: sleep 15

      - name: Publish codesteward-mcp
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/codesteward-mcp/dist/

  # ── Build, scan, push, sign container image ─────────────────────────────────
  #
  # Flow: build amd64 locally → Trivy scan (gates push) → build+push multi-arch
  # with provenance → cosign keyless sign → generate SBOM → upload release assets.
  container:
    name: Container build, scan, sign
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless signing via OIDC
      attestations: write

    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # OCI references must be lowercase. `github.repository` preserves the
      # original org/repo casing (e.g. "Codesteward/codesteward-graph"), which
      # breaks tooling like syft that does not auto-normalize. Export a
      # lowercased copy once and reuse it downstream.
      - name: Compute lowercased image name
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "IMAGE_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      # STEP 1 — Build amd64 locally for scanning (cached for the real push)
      - name: Build image for scan (amd64, local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: false
          load: true
          tags: codesteward:scan
          build-args: INSTALL_EXTRA=graph-all
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.69.3
          trivy --version

      # STEP 2 — Scan must pass before any publish step runs
      - name: Trivy scan (gate — HIGH/CRITICAL fails the release)
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --format json \
            --output trivy-report.json \
            codesteward:scan

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # STEP 3 — Real multi-arch build+push with SLSA provenance + SBOM attestation
      - name: Build and push multi-arch
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: INSTALL_EXTRA=graph-all
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # STEP 4 — cosign keyless signature
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via GitHub OIDC)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in $TAGS; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      # STEP 5 — SBOM for release assets
      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM from pushed image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          syft "${REGISTRY}/${IMAGE_LC}@${DIGEST}" \
            -o cyclonedx-json > sbom.cdx.json

      - name: Upload container reports
        uses: actions/upload-artifact@v4
        with:
          name: container-reports
          path: |
            trivy-report.json
            sbom.cdx.json
          if-no-files-found: error

  # ── Create GitHub release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [publish-pypi, container]
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download container reports
        uses: actions/download-artifact@v4
        with:
          name: container-reports
          path: container-reports/

      - name: Extract changelog for this version
        env:
          REPO: ${{ github.repository }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/release-notes.md
          {
            echo ""
            echo "## Container image"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/${REPO_LC}:${VERSION}"
            echo '```'
            echo ""
            echo "Image is signed with [cosign](https://github.com/sigstore/cosign) keyless via GitHub OIDC."
            echo "Verify with:"
            echo '```bash'
            echo "cosign verify ghcr.io/${REPO_LC}:${VERSION} \\"
            echo "  --certificate-identity-regexp 'https://github.com/${REPO}/.*' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com"
            echo '```'
          } >> /tmp/release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            dist/codesteward-graph/dist/*.whl
            dist/codesteward-graph/dist/*.tar.gz
            dist/codesteward-mcp/dist/*.whl
            dist/codesteward-mcp/dist/*.tar.gz
            container-reports/trivy-report.json
            container-reports/sbom.cdx.json
